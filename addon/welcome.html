<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bienvenido - ATC Trustpilot Sender</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f172a;
        --accent-2: #1e293b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Salesforce Sans", Arial, sans-serif;
        background: radial-gradient(circle at 20% 20%, #e2e8f0 0%, var(--bg) 45%);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: var(--card);
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }
      .logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
      }
      h1 { margin: 14px 0 10px; font-size: 28px; }
      p { margin: 0 0 12px; color: var(--muted); line-height: 1.5; }
      ul { margin: 12px 0 0; padding-left: 20px; }
      li { margin-bottom: 8px; color: var(--text); }
      code { background: #e2e8f0; border-radius: 5px; padding: 1px 6px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="logo">n</div>
        <h1>ATC Trustpilot Sender</h1>
        <p>Extension cargada correctamente.</p>
        <p>Uso rapido:</p>
        <ul>
          <li>Abre un registro <code>Account</code> en Salesforce.</li>
          <li>Pulsa la pestana lateral con la <code>n</code>.</li>
          <li>Abre el panel y envia la invitacion Trustpilot.</li>
        </ul>
      </section>
    </main>
  </body>
</html>
